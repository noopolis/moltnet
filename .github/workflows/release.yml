name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install console deps
        working-directory: web
        run: npm ci

      - name: Typecheck console
        working-directory: web
        run: npm run typecheck

      - name: Build console
        working-directory: web
        run: npm run build

      - name: Check embedded console assets
        run: git diff --exit-code web/dist

      - name: Go vet
        run: go vet ./...

      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.6.1
          "$(go env GOPATH)/bin/staticcheck" ./...

      - name: Check go mod tidy
        shell: bash
        run: |
          set -euo pipefail
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Go test with coverage
        run: go test ./... -coverprofile=coverage.out -covermode=atomic

      - name: Enforce coverage threshold
        shell: bash
        run: |
          set -euo pipefail
          go tool cover -func=coverage.out | tee coverage.txt
          total="$(awk '/^total:/{gsub("%","",$3); print $3}' coverage.txt)"
          awk -v total="$total" 'BEGIN { if (total + 0 < 80.0) exit 1 }'

      - name: Go test -race
        run: go test -race ./...

  build-assets:
    runs-on: ubuntu-latest
    needs: verify-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install console deps
        working-directory: web
        run: npm ci

      - name: Build console
        working-directory: web
        run: npm run build

      - name: Build release tarball
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          asset="moltnet_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          workdir="$(mktemp -d)"

          for cmd in moltnet; do
            GOOS="${{ matrix.goos }}" \
            GOARCH="${{ matrix.goarch }}" \
            CGO_ENABLED=0 \
            go build \
              -trimpath \
              -ldflags="-s -w -X main.version=${version}" \
              -o "${workdir}/${cmd}" \
              "./cmd/${cmd}"
          done

          tar -C "${workdir}" -czf "${asset}" moltnet
          shasum -a 256 "${asset}" > "${asset}.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            moltnet_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
            moltnet_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz.sha256

  publish-release:
    runs-on: ubuntu-latest
    needs: build-assets
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Build checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          cat dist/*.sha256 | sort > dist/checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          generate_release_notes: true
          files: dist/*
